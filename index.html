<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nikolasmelui</title>
    <meta name="description"
      content="Full-stack web developer (backend based) with 10+ years of experience. Head of VoxEngine &amp; DevTools at Voximplant." />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background: #000;
        color: #0f0;
        font-family: "Courier New", Courier, monospace;
      }

      #matrix {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      .hud {
        position: fixed;
        z-index: 2;
        pointer-events: none;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1rem 1.25rem;
        text-shadow: 0 0 8px rgba(0, 255, 0, 0.6);
      }

      .hud-top,
      .hud-bottom {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        font-size: 0.75rem;
        opacity: 0.85;
      }

      .panels {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        padding: 3.5rem 1.25rem 3rem;
        pointer-events: none;
      }

      .panel {
        background: rgba(0, 8, 0, 0.72);
        border: 1px solid rgba(0, 255, 0, 0.35);
        box-shadow: 0 0 24px rgba(0, 255, 0, 0.12);
        overflow: auto;
        padding: 1rem 1.1rem;
        font-size: 0.82rem;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.35s ease, transform 0.35s ease;
        pointer-events: auto;
      }

      .panel.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .panel h2 {
        font-size: 0.95rem;
        margin-bottom: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9f9;
      }

      .panel a {
        color: #6f6;
      }

      .panel.single {
        grid-column: 1 / -1;
        max-width: 52rem;
        margin: 0 auto;
        width: 100%;
      }

      .secret {
        position: fixed;
        left: 0;
        top: 0;
        width: 8px;
        height: 100%;
        z-index: 3;
        cursor: pointer;
        background: transparent;
      }

      .secret:hover {
        background: rgba(0, 255, 0, 0.08);
      }

      @media (max-width: 900px) {
        .panels {
          grid-template-columns: 1fr;
          overflow-y: auto;
          align-content: start;
        }

        .panel {
          min-height: 40vh;
        }
      }
    </style>
  </head>

  <body>
    <canvas id="matrix" aria-hidden="true"></canvas>

    <div class="hud" aria-hidden="true">
      <div class="hud-top">
        <span>nikolasmelui.github.io</span>
        <span id="mode-label">matrix</span>
      </div>
      <div class="hud-bottom">
        <span>[R] readme · [C] cv · [B] both · [M] matrix</span>
        <span id="status">booting...</span>
      </div>
    </div>

    <div class="panels" id="panels">
      <section class="panel" id="readme-panel" aria-label="README">
        <h2>README.md</h2>
        <pre id="readme-content">loading...</pre>
      </section>
      <section class="panel" id="cv-panel" aria-label="CV">
        <h2>CV.js</h2>
        <pre id="cv-content">loading...</pre>
      </section>
    </div>

    <div class="secret" title="Cycle view mode" aria-label="Cycle view mode"></div>

    <script src="CV.js"></script>
    <script>
      const MODES = ['matrix', 'readme', 'cv', 'both'];
      let modeIndex = 0;

      const modeLabel = document.getElementById('mode-label');
      const statusEl = document.getElementById('status');
      const readmePanel = document.getElementById('readme-panel');
      const cvPanel = document.getElementById('cv-panel');
      const readmeContent = document.getElementById('readme-content');
      const cvContent = document.getElementById('cv-content');

      function setMode(mode) {
        modeIndex = MODES.indexOf(mode);
        if (modeIndex < 0) modeIndex = 0;
        const current = MODES[modeIndex];
        modeLabel.textContent = current;

        readmePanel.classList.toggle('visible', current === 'readme' || current === 'both');
        cvPanel.classList.toggle('visible', current === 'cv' || current === 'both');
        readmePanel.classList.toggle('single', current === 'readme');
        cvPanel.classList.toggle('single', current === 'cv');
      }

      function cycleMode() {
        modeIndex = (modeIndex + 1) % MODES.length;
        setMode(MODES[modeIndex]);
      }

      document.querySelector('.secret').addEventListener('click', cycleMode);

      window.addEventListener('keydown', (event) => {
        const key = event.key.toLowerCase();
        if (key === 'r') setMode('readme');
        if (key === 'c') setMode('cv');
        if (key === 'b') setMode('both');
        if (key === 'm') setMode('matrix');
      });

      function stripCvMarkers(text) {
        const start = '<!-- cv:start -->';
        const end = '<!-- cv:end -->';
        const i = text.indexOf(start);
        const j = text.indexOf(end);
        if (i === -1 || j === -1) return text.trim();
        return text.slice(i + start.length, j).trim();
      }

      function linkifyLine(line) {
        return line
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      }

      function renderReadme(text) {
        const body = stripCvMarkers(text);
        readmeContent.innerHTML = body
          .split('\n')
          .map((line) => linkifyLine(line.replace(/</g, '&lt;').replace(/>/g, '&gt;')))
          .join('\n');
      }

      async function loadReadme() {
        const response = await fetch('README.md');
        if (!response.ok) throw new Error('README.md not found');
        const text = await response.text();
        renderReadme(text);
        statusEl.textContent = 'readme synced from CV.js';
      }

      function loadCv() {
        cvContent.textContent = formatCvPlain(nikolasmelui);
        statusEl.textContent = 'cv loaded from CV.js';
      }

      loadCv();

      loadReadme()
        .catch(() => {
          readmeContent.textContent = formatReadmeBio(nikolasmelui);
          statusEl.textContent = 'readme fallback from CV.js';
        })
        .finally(() => setMode('both'));

      // Matrix rain
      const canvas = document.getElementById('matrix');
      const ctx = canvas.getContext('2d');
      const glyphs = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>/{}[]();const let var fn=>README CV.js';
      let columns = 0;
      let drops = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const fontSize = 16;
        columns = Math.floor(canvas.width / fontSize);
        drops = Array.from({ length: columns }, () => Math.random() * -80);
        ctx.font = `${fontSize}px monospace`;
      }

      function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0f0';

        for (let i = 0; i < drops.length; i += 1) {
          const char = glyphs[Math.floor(Math.random() * glyphs.length)];
          const x = i * 16;
          const y = drops[i] * 16;
          ctx.fillText(char, x, y);

          if (y > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i] += 1;
        }

        requestAnimationFrame(drawMatrix);
      }

      window.addEventListener('resize', resize);
      resize();
      drawMatrix();
    </script>
  </body>

</html>
